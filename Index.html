<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Real-Time - Jandira</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 70vh; width: 100%; }
        .info-panel { padding: 20px; background: #222; color: white; }
        .status { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

<div class="info-panel">
    <h2>Linha JT321 - Terminal Jandira</h2>
    <p>Status: <span class="status">Monitorando via GPS</span></p>
    <p id="arrival-time">Previsão: Calculando...</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Inicializa o mapa focado em Jandira
    const map = L.map('map').setView([-23.5275, -46.9024], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 2. Ícone personalizado do ônibus
    const busIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/1042/1042263.png',
        iconSize: [35, 35]
    });

    // 3. Marcador do ônibus (Posição inicial)
    let busMarker = L.marker([-23.5275, -46.9024], {icon: busIcon}).addTo(map)
        .bindPopup("<b>JT321</b><br>Prefixo: 12345")
        .openPopup();

    // 4. Função para simular movimento (Onde entraria sua API no futuro)
    function updateBusPosition() {
        // Aqui simulamos uma pequena variação de GPS
        let currentLat = busMarker.getLatLng().lat + (Math.random() - 0.5) * 0.001;
        let currentLng = busMarker.getLatLng().lng + (Math.random() - 0.5) * 0.001;
        
        let newPos = [currentLat, currentLng];
        busMarker.setLatLng(newPos);
        map.panTo(newPos);

        document.getElementById('arrival-time').innerText = "Previsão: " + Math.floor(Math.random() * 10 + 2) + " min";
    }

    // Atualiza a cada 3 segundos
    setInterval(updateBusPosition, 3000);
</script>

</body>
</html>
